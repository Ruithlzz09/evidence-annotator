<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evidence Annotator Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="toolbar">
    <input type="file" id="file-input" accept="image/png" hidden>

    <div class="tool-section">
      <button id="open-btn" class="btn-primary">Open PNG</button>
    </div>

    <span class="separator"></span>

    <div class="tool-section">
      <span class="section-label">Tools</span>
      <div class="btn-group">
        <button data-tool="select" class="active">Select</button>
        <button data-tool="rect">Rectangle</button>
        <button data-tool="highlight">Highlight</button>
        <button data-tool="line">Line</button>
        <button data-tool="arrow">Arrow</button>
        <button data-tool="pen">Pen</button>
        <button data-tool="text">Text</button>
        <button data-tool="marker">Marker</button>
        <button data-tool="bubble">Bubble</button>
        <button data-tool="redact">Redact</button>
      </div>
    </div>

    <span class="separator"></span>

    <div class="tool-section">
      <span class="section-label">Edit</span>
      <div class="btn-group">
        <button id="undo-btn" disabled title="Undo last action (Ctrl+Z)">Undo</button>
        <button id="delete-btn" disabled>Delete</button>
        <button id="delete-all-btn" disabled>Delete All</button>
      </div>
    </div>

    <span class="separator"></span>

    <div class="tool-section">
      <span class="section-label">Stroke</span>
      <div class="stroke-controls">
        <div class="color-swatches">
          <button class="swatch active" data-color="#ff0000" style="background:#ff0000" title="Red"></button>
          <button class="swatch" data-color="#ff6600" style="background:#ff6600" title="Orange"></button>
          <button class="swatch" data-color="#ffcc00" style="background:#ffcc00" title="Yellow"></button>
          <button class="swatch" data-color="#00cc44" style="background:#00cc44" title="Green"></button>
          <button class="swatch" data-color="#0088ff" style="background:#0088ff" title="Blue"></button>
          <button class="swatch" data-color="#cc00ff" style="background:#cc00ff" title="Purple"></button>
          <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
          <button class="swatch" data-color="#000000" style="background:#000000" title="Black"></button>
        </div>
        <input type="color" id="stroke-color" value="#ff0000" title="Custom color">
        <input type="range" id="stroke-width" min="1" max="20" value="3" title="Stroke width">
        <label class="marker-size-label" title="Marker circle size in screen pixels">
          ⌀<input type="number" id="marker-size" min="10" max="80" value="20">
        </label>
      </div>
    </div>

    <span class="separator"></span>

    <div class="tool-section">
      <span class="section-label">Annotations</span>
      <div class="btn-group">
        <button id="import-ann-btn" disabled title="Load annotations from a JSON file">Import JSON</button>
        <button id="export-ann-btn" disabled title="Save annotations as a JSON file">Export JSON</button>
      </div>
    </div>

    <span class="separator"></span>

    <div class="tool-section">
      <span class="section-label">Save</span>
      <div class="btn-group">
        <button id="save-btn" disabled title="Embed annotations as metadata — reopen to edit">Save Editable</button>
        <button id="save-flat-btn" disabled title="Burn annotations onto the image pixels">Save Flat</button>
      </div>
    </div>

    <input type="file" id="ann-import-input" accept=".json" hidden>

  </div>

  <div id="status">Ready. Open a PNG to begin.</div>

  <div id="canvas-area">
    <div id="drop-hint">Drop a PNG here or click "Open PNG"</div>
    <div id="container" style="display:none"></div>
  </div>

  <script src="vendor/pako.min.js"></script>
  <script src="vendor/konva.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
